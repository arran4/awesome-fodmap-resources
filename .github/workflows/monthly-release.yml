name: Monthly Release

on:
  schedule:
    - cron: '0 0 1 * *' # Run at midnight on the 1st of every month
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Check for changes
        id: check_changes
        run: |
          # Get the latest tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found. Proceeding with release."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "Last tag: $LAST_TAG"
            # Check for commits between last tag and HEAD
            COMMITS=$(git log $LAST_TAG..HEAD --oneline)
            if [ -z "$COMMITS" ]; then
              echo "No changes since last tag. Skipping release."
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "Changes detected."
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set Release Variables
        if: steps.check_changes.outputs.has_changes == 'true'
        id: vars
        run: |
          ISSUE_NAME="Issue-$(date +'%Y-%m')"
          echo "tag_name=$ISSUE_NAME" >> $GITHUB_OUTPUT
          echo "release_name=Issue $(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build Book
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          python scripts/build_book.py
          pandoc book.md -o "awesome-fodmap-${{ steps.vars.outputs.tag_name }}.epub" --metadata title="Awesome FODMAP Resources - ${{ steps.vars.outputs.release_name }}"

      - name: Create Release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.release_name }}
          files: |
            awesome-fodmap-${{ steps.vars.outputs.tag_name }}.epub
            book.md
          draft: false
          prerelease: false
